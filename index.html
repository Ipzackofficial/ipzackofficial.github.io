<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ip Zack | Zubakaya</title>
    <style>
        :root {
            --green: #006400;
            --gold: #ffd700;
            --red: #c8102e;
            --dark: #0f2a0f;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--dark), var(--green));
            color: white;
            margin: 0;
            padding: 20px 15px;
            text-align: center;
            min-height: 100vh;
            line-height: 1.5;
        }
        .container {
            max-width: 520px;
            margin: 30px auto;
        }
        .profile {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            border: 6px solid var(--gold);
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            object-fit: cover;
        }
        h1 {
            font-size: 2.6em;
            margin: 8px 0 6px;
            font-weight: 800;
            color: var(--gold);
        }
        .handle {
            font-size: 1.2em;
            opacity: 0.9;
            margin-bottom: 12px;
        }
        .bio {
            font-size: 1.12em;
            margin: 0 auto 40px;
            max-width: 440px;
            opacity: 0.95;
            line-height: 1.45;
        }
        .link-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: rgba(255,255,255,0.15);
            color: white;
            text-decoration: none;
            padding: 17px 24px;
            margin: 12px auto;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1em;
            transition: all 0.3s ease;
            max-width: 440px;
            border: 2px solid transparent;
        }
        .link-button:hover {
            background: white;
            color: var(--green);
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.4);
            border-color: var(--gold);
        }
        .official {
            background: var(--gold) !important;
            color: var(--green) !important;
            font-weight: 800;
        }
        .footer {
            margin-top: 50px;
            font-size: 1.05em;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="profile.jpg" alt="Ip Zack" class="profile">
        
        <h1>Ip Zack</h1>
        <p class="handle">@ipzackofficial</p>
        <p class="bio">Kenyan artist pioneering the <strong>Zubakaya</strong> genre<br>
        Ancient drums, dancehall bass &amp; pure soul frequencies 🇰🇪</p>
        
        <!-- Links -->
        <a href="https://www.youtube.com/@Zubakaya" class="link-button" target="_blank">▶️ YouTube</a>
        <a href="https://tiktok.com/@zubakaya" class="link-button" target="_blank">🎤 TikTok</a>
        <a href="https://www.facebook.com/share/18tuFiAdjA/" class="link-button" target="_blank">📘 Facebook</a>
        <a href="https://ipzackofficial.github.io/ipzack/" class="link-button official" target="_blank">🌐 Official Website</a>
        <a href="https://wa.me/254719325574" class="link-button" target="_blank">💬 WhatsApp</a>
        
        <div class="footer">
            Pioneering Zubakaya • Made in Kenya
        </div>
    </div>
</body>
</html>
